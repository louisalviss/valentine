name: Deploy Mira preview to Cloudflare

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - "mira-ai-motion/deploy-pr-trigger.txt"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Deploy to temporary Cloudflare account
        shell: bash
        run: |
          set -euo pipefail
          npx wrangler@4.110.0 deploy mira-ai-motion --temporary 2>&1 | tee deploy.log

          URL=$(grep -Eo 'https://[A-Za-z0-9.-]+\.(workers|pages)\.dev[^[:space:]]*' deploy.log | tail -n 1 | sed -E 's/[),]+$//')
          if [ -z "$URL" ]; then
            echo "Cloudflare URL was not found in Wrangler output."
            cat deploy.log
            exit 1
          fi

          printf 'CLOUDFLARE_URL=%s\n' "$URL" >> "$GITHUB_ENV"

      - name: Comment deployment URL on pull request
        uses: actions/github-script@v7
        env:
          CLOUDFLARE_URL: ${{ env.CLOUDFLARE_URL }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Cloudflare preview: ${process.env.CLOUDFLARE_URL}`
            })

      - name: Add deployment link to summary
        shell: bash
        run: |
          echo "## Cloudflare preview" >> "$GITHUB_STEP_SUMMARY"
          echo "$CLOUDFLARE_URL" >> "$GITHUB_STEP_SUMMARY"
