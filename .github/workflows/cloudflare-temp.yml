name: Deploy Mira preview to Cloudflare

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - "mira-ai-motion/deploy-pr-trigger.txt"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Deploy to temporary Cloudflare account
        id: cloudflare
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npx wrangler@4.110.0 deploy mira-ai-motion --temporary 2>&1 | tee deploy.log
          CODE=${PIPESTATUS[0]}
          URL=$(grep -Eo 'https://[A-Za-z0-9.-]+\.(workers|pages)\.dev[^[:space:]]*' deploy.log | tail -n 1 | sed -E 's/[),]+$//')

          if [ -n "$URL" ]; then
            {
              echo "Cloudflare preview: $URL"
            } > deploy-comment.md
          else
            {
              echo "Cloudflare deployment failed (exit code $CODE)."
              echo
              echo '```text'
              tail -n 60 deploy.log
              echo '```'
            } > deploy-comment.md
          fi

      - name: Comment result on pull request
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('deploy-comment.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
