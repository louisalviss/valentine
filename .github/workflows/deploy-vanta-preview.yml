name: Deploy VANTA scroll landing page to Cloudflare

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          rm -rf .preview-site
          mkdir -p .preview-site
          cp vanta-cloudflare/index.html .preview-site/index.html

      - name: Deploy to temporary Cloudflare account
        id: deploy
        shell: bash
        run: |
          set +e
          npx wrangler deploy --assets .preview-site --name vanta-scroll-motion --compatibility-date 2026-07-14 > deploy.log 2>&1
          STATUS=$?
          cat deploy.log
          URL=$(grep -Eo 'https://[^[:space:]]+\.workers\.dev' deploy.log | tail -1 || true)
          CLAIM=$(grep -Eo 'https://dash\.cloudflare\.com/claim-preview\?claimToken=[^[:space:]]+' deploy.log | tail -1 || true)
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "claim=$CLAIM" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Comment deployment result
        uses: actions/github-script@v7
        env:
          STATUS: ${{ steps.deploy.outputs.status }}
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
          CLAIM_URL: ${{ steps.deploy.outputs.claim }}
        with:
          script: |
            const status = process.env.STATUS;
            const preview = process.env.PREVIEW_URL;
            const claim = process.env.CLAIM_URL;
            const fs = require('fs');
            let body;
            if (status === '0' && preview) {
              body = `Cloudflare preview: ${preview}`;
              if (claim) body += `\n\nClaim within 60 minutes: ${claim}`;
            } else {
              const log = fs.readFileSync('deploy.log', 'utf8').slice(-7000);
              body = `Cloudflare deployment failed (exit code ${status}).\n\n\`\`\`text\n${log}\n\`\`\``;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Fail job when deployment failed
        if: steps.deploy.outputs.status != '0'
        run: exit 1
